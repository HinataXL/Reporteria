<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva conversación</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(0, 217, 255, 0.12), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(255, 215, 0, 0.08), transparent 30%),
                    #10231F;
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .form-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,217,255,0.22);
            transition: all .2s ease;
        }

        .form-input:focus {
            border-color: #00d9ff;
            box-shadow: 0 0 0 3px rgba(0,217,255,0.12);
            transform: translateY(-1px);
        }

        .fade-up {
            animation: fadeUp .55s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="text-[#F4F0E6] min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <header class="mb-8 fade-up">
        <a href="/conversations"
           class="inline-flex items-center gap-2 text-[#ffd700] border border-[#ffd700] px-4 py-2 rounded-2xl font-black hover:bg-[#ffd700] hover:text-black transition">
            ← Volver
        </a>

        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mt-6">
            <div>
                <h1 class="text-5xl font-black tracking-tight">
                    Nueva conversación
                </h1>

                <p class="text-slate-300 mt-2">
                    🎧 Registro manual de atención de soporte.
                </p>
            </div>

            <div class="bg-white/10 border border-white/10 rounded-2xl px-4 py-2 text-sm font-bold">
                <span class="text-[#00d9ff]">●</span> Sistema Activo
            </div>
        </div>
    </header>

    <form th:action="@{/conversations/save}"
          method="post"
          class="glass-card rounded-[32px] p-7 fade-up grid gap-7">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <section class="grid md:grid-cols-2 gap-5">

            <div>
                <label class="font-black text-sm text-slate-300">
                    👤 Nombre del cliente <span class="text-red-400">*</span>
                </label>
                <input name="clienteNombre"
                       required
                       placeholder="Ej. Juan Pérez"
                       class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none">
            </div>

            <div>
                <label class="font-black text-sm text-slate-300">
                    📞 Teléfono
                </label>
                <input name="clienteTelefono"
                       placeholder="+502 0000-0000"
                       class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none">
            </div>

            <div>
                <label class="font-black text-sm text-slate-300">
                    ✉️ Correo
                </label>
                <input name="clienteCorreo"
                       type="email"
                       placeholder="cliente@empresa.com"
                       class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none">
            </div>

            <div>
                <label class="font-black text-sm text-slate-300">
                    🌐 Canal de origen <span class="text-red-400">*</span>
                </label>
                <select name="channelId"
                        required
                        class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                    <option value="1">WhatsApp</option>
                    <option value="2">Instagram</option>
                    <option value="3">Facebook</option>
                </select>
            </div>

        </section>

        <hr class="border-white/10">

        <section class="grid gap-5">

            <div>
                <label class="font-black text-sm text-slate-300">
                    🧾 Problema / Asunto <span class="text-red-400">*</span>
                </label>

                <select id="issueTypeId"
                        name="issueTypeId"
                        required
                        class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                    <option value="">Seleccione un problema</option>

                    <option th:each="issue : ${issueTypes}"
                            th:value="${issue.id}"
                            th:text="${issue.nombre}"
                            th:attr="data-requires-rejection=${issue.requiereCodigoRechazo}">
                        Problema
                    </option>
                </select>
            </div>

            <div id="rejectionCodeBox" class="hidden">
                <label class="font-black text-sm text-slate-300">
                    💳 Código de rechazo bancario <span class="text-red-400">*</span>
                </label>

                <select name="rejectionCodeId"
                        id="rejectionCodeId"
                        class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                    <option value="">Seleccione código de rechazo</option>

                    <option th:each="code : ${rejectionCodes}"
                            th:value="${code.id}"
                            th:text="${code.codigo + ' - ' + code.descripcion}">
                        Código
                    </option>
                </select>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="font-black text-sm text-slate-300">
                        📝 Descripción de la conversación
                    </label>

                    <span class="text-xs text-slate-400">
                        <span id="descriptionCounter">0</span> / 1000
                    </span>
                </div>

                <textarea name="descripcion"
                          id="descripcion"
                          rows="5"
                          maxlength="1000"
                          placeholder="Escribe el detalle aquí..."
                          class="form-input w-full px-4 py-3 rounded-2xl outline-none resize-y"></textarea>
            </div>

        </section>

        <section class="grid md:grid-cols-3 gap-5 bg-black/15 border border-white/10 rounded-3xl p-5">

            <div>
                <label class="font-black text-sm text-slate-300">
                    📌 Estado
                </label>
                <select name="statusId"
                        class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                    <option value="1">Pendiente</option>
                    <option value="2">En Proceso</option>
                    <option value="3">Resuelto</option>
                    <option value="4">Escalado</option>
                    <option value="5">Cerrado</option>
                </select>
            </div>

            <div>
                <label class="font-black text-sm text-slate-300">
                    🚦 Prioridad
                </label>
                <select name="priorityId"
                        class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                    <option value="1">Baja</option>
                    <option value="2">Normal</option>
                    <option value="3">Alta</option>
                </select>
            </div>

            <div>
                <label class="font-black text-sm text-slate-300">
                    ⏱ Tiempo gestión (min)
                </label>
                <input name="tiempoGestionMinutos"
                       type="number"
                       min="0"
                       value="0"
                       class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none">
            </div>

        </section>

        <section class="grid md:grid-cols-2 gap-5">

            <div class="bg-white/5 border border-white/10 rounded-3xl p-5">
                <label class="flex items-center gap-3 font-black cursor-pointer">
                    <input type="checkbox"
                           id="ticketAperturado"
                           name="ticketAperturado"
                           value="true"
                           class="w-5 h-5">
                    ¿Se aperturó ticket?
                </label>

                <div id="ticketBox" class="hidden mt-4">
                    <label class="font-black text-sm text-slate-300">
                        🎫 Número de ticket <span class="text-red-400">*</span>
                    </label>

                    <input name="numeroTicket"
                           id="numeroTicket"
                           placeholder="Ej. INC-2026-000145"
                           class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none">
                </div>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-3xl p-5">
                <label class="flex items-center gap-3 font-black cursor-pointer">
                    <input type="checkbox"
                           id="conversacionTransferida"
                           name="conversacionTransferida"
                           value="true"
                           class="w-5 h-5">
                    Conversación transferida
                </label>

                <div id="departmentBox" class="hidden mt-4">
                    <label class="font-black text-sm text-slate-300">
                        🏢 Departamento <span class="text-red-400">*</span>
                    </label>

                    <select name="departmentId"
                            id="departmentId"
                            class="form-input mt-2 w-full px-4 py-3 rounded-2xl outline-none bg-[#10231F]">
                        <option value="">Seleccione departamento</option>

                        <option th:each="department : ${departments}"
                                th:value="${department.id}"
                                th:text="${department.nombre}">
                            Departamento
                        </option>
                    </select>
                </div>
            </div>

        </section>

        <section>
            <div class="flex items-center justify-between mb-2">
                <label class="font-black text-sm text-slate-300">
                    🕶 Observaciones internas
                </label>

                <span class="text-xs text-slate-400">
                    <span id="observationsCounter">0</span> / 500
                </span>
            </div>

            <textarea name="observaciones"
                      id="observaciones"
                      rows="4"
                      maxlength="500"
                      placeholder="Notas adicionales que el cliente no verá..."
                      class="form-input w-full px-4 py-3 rounded-2xl outline-none resize-y border-dashed"></textarea>
        </section>

        <footer class="flex flex-col md:flex-row md:justify-end gap-3 pt-3">

            <a href="/conversations"
               class="bg-white/10 hover:bg-white/15 border border-white/10 px-6 py-3 rounded-2xl font-black text-center transition">
                Cancelar
            </a>

            <button type="submit"
                    class="bg-[#ffd700] hover:bg-yellow-300 text-black px-8 py-3 rounded-2xl font-black transition shadow-lg shadow-yellow-500/20">
                Guardar conversación
            </button>

        </footer>

    </form>

</div>

<script>
    const issueType = document.getElementById('issueTypeId');
    const rejectionBox = document.getElementById('rejectionCodeBox');
    const rejectionCode = document.getElementById('rejectionCodeId');

    const ticketCheck = document.getElementById('ticketAperturado');
    const ticketBox = document.getElementById('ticketBox');
    const numeroTicket = document.getElementById('numeroTicket');

    const transferCheck = document.getElementById('conversacionTransferida');
    const departmentBox = document.getElementById('departmentBox');
    const departmentId = document.getElementById('departmentId');

    const descripcion = document.getElementById('descripcion');
    const observaciones = document.getElementById('observaciones');
    const descriptionCounter = document.getElementById('descriptionCounter');
    const observationsCounter = document.getElementById('observationsCounter');

    issueType.addEventListener('change', () => {
        const selected = issueType.options[issueType.selectedIndex];
        const requiresRejection = selected.dataset.requiresRejection === 'true';

        rejectionBox.classList.toggle('hidden', !requiresRejection);
        rejectionCode.required = requiresRejection;

        if (!requiresRejection) {
            rejectionCode.value = '';
        }
    });

    ticketCheck.addEventListener('change', () => {
        ticketBox.classList.toggle('hidden', !ticketCheck.checked);
        numeroTicket.required = ticketCheck.checked;

        if (!ticketCheck.checked) {
            numeroTicket.value = '';
        }
    });

    transferCheck.addEventListener('change', () => {
        departmentBox.classList.toggle('hidden', !transferCheck.checked);
        departmentId.required = transferCheck.checked;

        if (!transferCheck.checked) {
            departmentId.value = '';
        }
    });

    descripcion.addEventListener('input', () => {
        descriptionCounter.innerText = descripcion.value.length;
    });

    observaciones.addEventListener('input', () => {
        observationsCounter.innerText = observaciones.value.length;
    });
</script>

</body>
</html>
