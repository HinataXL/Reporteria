<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#10231F] text-[#F4F0E6] min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
        <div>
            <a href="/conversations" class="text-yellow-300 font-bold hover:underline">
                ← Volver
            </a>

            <h1 class="text-4xl font-black mt-4">Mi perfil</h1>
            <p class="opacity-70">Gestiona tu cuenta, contraseña y seguridad.</p>
        </div>

        <a href="/settings/2fa"
           class="bg-[#00d9ff] text-black px-5 py-3 rounded-2xl font-black">
            Configurar 2FA
        </a>
    </div>

    <div th:if="${success}"
         class="mb-5 bg-green-500/20 text-green-300 border border-green-500/30 rounded-2xl px-4 py-3 font-bold"
         th:text="${success}">
    </div>

    <div th:if="${error}"
         class="mb-5 bg-red-500/20 text-red-300 border border-red-500/30 rounded-2xl px-4 py-3 font-bold"
         th:text="${error}">
    </div>

    <div class="grid lg:grid-cols-2 gap-6">

        <section class="bg-white/10 border border-white/10 rounded-3xl p-6">
            <h2 class="text-2xl font-black mb-5">Datos de usuario</h2>

            <div class="space-y-4">
                <div>
                    <p class="opacity-60">Nombre</p>
                    <p class="font-bold text-xl" th:text="${user.nombre + ' ' + user.apellido}">
                        Nombre Usuario
                    </p>
                </div>

                <div>
                    <p class="opacity-60">Correo</p>
                    <p class="font-bold text-xl text-[#00d9ff]" th:text="${user.correo}">
                        correo@email.com
                    </p>
                </div>

                <div>
                    <p class="opacity-60">Rol</p>
                    <p class="font-bold text-xl text-[#ffd700]" th:text="${user.role.nombre}">
                        ADMIN
                    </p>
                </div>

                <div>
                    <p class="opacity-60">Estado</p>
                    <span th:if="${user.estado == 1}"
                          class="inline-block bg-green-500/20 text-green-300 px-3 py-1 rounded-xl font-bold">
                        Activo
                    </span>

                    <span th:if="${user.estado == 0}"
                          class="inline-block bg-red-500/20 text-red-300 px-3 py-1 rounded-xl font-bold">
                        Inactivo
                    </span>
                </div>

                <div>
                    <p class="opacity-60">2FA</p>
                    <span th:if="${user.totpEnabled == true}"
                          class="inline-block bg-green-500/20 text-green-300 px-3 py-1 rounded-xl font-bold">
                        Activado
                    </span>

                    <span th:unless="${user.totpEnabled == true}"
                          class="inline-block bg-yellow-500/20 text-yellow-300 px-3 py-1 rounded-xl font-bold">
                        No activado
                    </span>
                </div>
            </div>
        </section>

        <section class="bg-white/10 border border-white/10 rounded-3xl p-6">
            <h2 class="text-2xl font-black mb-5">Cambiar contraseña</h2>

            <form th:action="@{/profile/change-password}" method="post" class="space-y-4">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div>
                    <label class="font-bold">Contraseña actual</label>
                    <input name="currentPassword"
                           type="password"
                           required
                           class="mt-2 w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none">
                </div>

                <div>
                    <label class="font-bold">Nueva contraseña</label>
                    <input name="newPassword"
                           type="password"
                           required
                           class="mt-2 w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none">
                </div>

                <div>
                    <label class="font-bold">Confirmar nueva contraseña</label>
                    <input name="confirmPassword"
                           type="password"
                           required
                           class="mt-2 w-full px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none">
                </div>

                <button type="submit"
                        class="w-full bg-[#ffd700] hover:bg-yellow-300 text-black px-5 py-3 rounded-2xl font-black">
                    Actualizar contraseña
                </button>

            </form>
        </section>

    </div>

</div>

</body>
</html>
